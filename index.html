<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Explainers</title>
<style>
  :root{
    --ink:#23272e;--muted:#6b7280;--bg:#fbfaf7;--card:#ffffff;
    --line:#e9e7e1;--accent:#2f7d75;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:18px;line-height:1.7;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px;margin:0 auto;padding:3.5rem 1.25rem 5rem;}
  h1{font-size:2rem;margin:0 0 .4rem;letter-spacing:-.01em;}
  .sub{color:var(--muted);margin:0 0 2.4rem;}
  a.card{
    display:block;text-decoration:none;color:inherit;
    background:var(--card);border:1px solid var(--line);border-radius:13px;
    padding:1.1rem 1.3rem;margin-bottom:1rem;
    transition:transform .08s ease,box-shadow .08s ease;
  }
  a.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.06);}
  a.card h2{margin:0 0 .25rem;font-size:1.12rem;color:var(--accent);}
  a.card p{margin:0;color:var(--muted);font-size:.95rem;}
  footer{margin-top:3rem;color:var(--muted);font-size:.88rem;}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Explainers</h1>
    <p class="sub">Short, clear explainers on how computing works.</p>

    <a class="card" href="what-is-a-runtime.html">
      <h2>What is a runtime?</h2>
      <p>The layers between what a person wants and what a machine does.</p>
    </a>

    <footer>Published with GitHub Pages.</footer>
  </div>
</body>
</html>
